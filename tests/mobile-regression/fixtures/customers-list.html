<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fixture — Customers mobile list</title>
    <!--
      Fixture for the Customers list mobile fix (commit 0832d37 / bfd32dc).

      Append ?broken=1 to force the pre-fix markup so the regression test
      can demonstrate that the broken layout is actually caught.
    -->
    <!-- The compiled CSS is injected by the Playwright spec via
         page.addStyleTag({ path: '<dist/assets/index-*.css>' }). -->
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <!--
      Mirrors the App.tsx main wrapper that received `overflow-x-hidden`
      in the fix, and the Customers.tsx responsive table ↔ card layout.
    -->
    <main class="flex-1 lg:pl-64 flex flex-col min-h-screen">
      <div id="main-wrapper" class="flex-1 p-4 sm:p-6 lg:p-8 w-full overflow-x-hidden">
        <!--
          Simulates a wide element (e.g. the RevenueChart / Analytics card
          that has a min-width wider than a phone viewport). Without the
          `overflow-x-hidden` fix on the main wrapper, this forces the
          body to scroll horizontally on mobile.
        -->
        <div id="wide-content"
             class="h-12 mb-4 bg-slate-100 rounded-xl"
             style="min-width: 800px;"></div>

        <div class="bg-white rounded-3xl border border-slate-100 shadow-sm shadow-slate-200/20 overflow-hidden">
          <div id="list-container" class="min-h-[400px]">
            <!-- Mobile card grid (added by the fix) -->
            <div id="mobile-cards" class="sm:hidden p-4 space-y-3">
              <div class="bg-white p-4 rounded-2xl border border-slate-100">
                <div class="flex items-center gap-3 mb-3">
                  <div class="w-10 h-10 rounded-full bg-slate-100"></div>
                  <div>
                    <div class="text-sm font-semibold text-surface-900">Ali Valiyev</div>
                    <div class="text-xs text-slate-500">ali@example.com</div>
                  </div>
                </div>
                <div class="flex gap-2">
                  <span class="text-xs px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600">Faol</span>
                  <span class="text-xs px-2 py-0.5 rounded-md bg-slate-100 text-slate-600">VIP</span>
                </div>
              </div>
              <div class="bg-white p-4 rounded-2xl border border-slate-100">
                <div class="flex items-center gap-3 mb-3">
                  <div class="w-10 h-10 rounded-full bg-slate-100"></div>
                  <div>
                    <div class="text-sm font-semibold text-surface-900">Dilnoza Karimova</div>
                    <div class="text-xs text-slate-500">dilnoza@example.com</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Desktop table (wrapped in a `hidden sm:block` container by the fix) -->
            <div id="desktop-table-wrapper" class="hidden sm:block">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr class="bg-slate-50/50 border-b border-slate-100">
                    <th class="px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Mijoz</th>
                    <th class="px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Kompaniya elektron pochtasi uzun sarlavha</th>
                    <th class="px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Teglar</th>
                    <th class="px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Holat</th>
                    <th class="px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Jami sarflagan</th>
                    <th class="px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Qo'shilgan sana</th>
                    <th class="px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider text-right">Amallar</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                  <tr>
                    <td class="px-6 py-4 whitespace-nowrap">Ali Valiyev</td>
                    <td class="px-6 py-4 whitespace-nowrap">Joyful Technologies International LLC</td>
                    <td class="px-6 py-4 whitespace-nowrap">VIP, Premium</td>
                    <td class="px-6 py-4 whitespace-nowrap">Faol</td>
                    <td class="px-6 py-4 whitespace-nowrap">12 345 678 so'm</td>
                    <td class="px-6 py-4 whitespace-nowrap">2024-01-15</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(location.search);
      if (params.get('broken') === '1') {
        // Reproduce the pre-fix broken layout:
        //  1. Remove overflow-x-hidden from the main wrapper so wide
        //     content causes horizontal page scroll on mobile.
        //  2. Remove the mobile card grid and the `hidden sm:block`
        //     wrapper around the desktop table so the raw table
        //     renders on mobile and spills past the viewport.
        const wrapper = document.getElementById('main-wrapper');
        wrapper.classList.remove('overflow-x-hidden');

        document.getElementById('mobile-cards').remove();
        const desktopWrapper = document.getElementById('desktop-table-wrapper');
        desktopWrapper.classList.remove('hidden');
        desktopWrapper.classList.remove('sm:block');
      }
    </script>
  </body>
</html>
